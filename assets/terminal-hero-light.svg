<svg width="960" height="300" viewBox="0 0 960 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Liu Yang terminal hero light</title>
  <desc id="desc">A terminal-style banner in light mode introducing Liu Yang, focused on networks, infrastructure, self-hosted systems, and machine learning systems.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="24" x2="880" y2="276" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="frame" x1="144" y1="52" x2="816" y2="248" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="glow" x1="196" y1="102" x2="763" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="104" y="16" width="752" height="272" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="960" height="300" rx="24" fill="url(#bg)"/>
  <g opacity="0.35">
    <path d="M84 44H876" stroke="#CBD5E1"/>
    <path d="M84 84H876" stroke="#CBD5E1"/>
    <path d="M84 124H876" stroke="#CBD5E1"/>
    <path d="M84 164H876" stroke="#CBD5E1"/>
    <path d="M84 204H876" stroke="#CBD5E1"/>
    <path d="M84 244H876" stroke="#CBD5E1"/>
    <path d="M164 24V276" stroke="#CBD5E1"/>
    <path d="M284 24V276" stroke="#CBD5E1"/>
    <path d="M404 24V276" stroke="#CBD5E1"/>
    <path d="M524 24V276" stroke="#CBD5E1"/>
    <path d="M644 24V276" stroke="#CBD5E1"/>
    <path d="M764 24V276" stroke="#CBD5E1"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="36" width="720" height="228" rx="18" fill="url(#frame)" stroke="#CBD5E1"/>
    <rect x="120" y="36" width="720" height="34" rx="18" fill="#E2E8F0"/>
    <path d="M120 54C120 44.059 128.059 36 138 36H822C831.941 36 840 44.059 840 54V70H120V54Z" fill="#F1F5F9"/>
    <circle cx="148" cy="53" r="5" fill="#EF4444"/>
    <circle cx="166" cy="53" r="5" fill="#F59E0B"/>
    <circle cx="184" cy="53" r="5" fill="#10B981"/>
    <text x="220" y="58" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="12">liuyang@workspace: ~/profile</text>

    <rect x="144" y="88" width="672" height="152" rx="12" fill="url(#glow)"/>

    <text x="156" y="110" fill="#16A34A" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="17">$ whoami</text>
    <text x="156" y="138" fill="#0F172A" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="28" font-weight="700">Liu Yang</text>

    <text x="156" y="172" fill="#16A34A" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="17">$ focus --now</text>
    <text x="156" y="198" fill="#1D4ED8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="15">networks | infrastructure | self-hosted | ml systems</text>

    <text x="156" y="226" fill="#16A34A" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="17">$ echo $BLOG</text>
    <text x="156" y="248" fill="#0EA5E9" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="15">https://liuyang.dev</text>
    <rect x="328" y="234" width="9" height="17" rx="1.5" fill="#0EA5E9">
      <animate attributeName="opacity" values="1;0;1" dur="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
